<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

    <!-- Sidebar (optional but needed for layout) -->
    <div class="sidebar">
        <h2>🤖 AI Chatbot</h2>
        <p style="opacity:0.7;">Flask + Groq AI</p>
    </div>

    <!-- Chat Section -->
    <div class="chat-section">

        <!-- Chat messages -->
        <div id="chat-box" class="chat-box"></div>

        <!-- Input -->
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Type a message..." />
            <button onclick="sendMessage()">Send</button>
        </div>

         <!-- ✅ FOOTER (ADD HERE — JUST ABOVE </div> chat-section ends) -->
        <div class="footer">
            Made by <span>harshskarki</span>
        </div>

    </div>

</div>

<script>

async function sendMessage() {

    const input = document.getElementById("user-input");
    const chatBox = document.getElementById("chat-box");

    const userMessage = input.value.trim();
    if (!userMessage) return;

    // 🧑 user message
    chatBox.innerHTML += `
        <div class="message user-message">
            ${userMessage}
        </div>
    `;

    input.value = "";
    chatBox.scrollTop = chatBox.scrollHeight;

    // ⏳ typing
    const typingId = "typing-" + Date.now();

    chatBox.innerHTML += `
        <div class="message bot-message" id="${typingId}">
            Thinking...
        </div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;

    try {

        const response = await fetch('https://ai-chatbot-mgao.onrender.com/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: userMessage })
        });

        const data = await response.json();
        console.log(data);
        
        // remove typing
        const typingElement = document.getElementById(typingId);
        if (typingElement) typingElement.remove();

        // bot reply
        chatBox.innerHTML += `
            <div class="message bot-message">
                ${formatText(data.response)}
            </div>
        `;

        chatBox.scrollTop = chatBox.scrollHeight;

    } catch (error) {

        const typingElement = document.getElementById(typingId);
        if (typingElement) typingElement.remove();

        chatBox.innerHTML += `
            <div class="message bot-message">
                ⚠️ Error getting response
            </div>
        `;
    }
}

// format
function formatText(text) {
    return text.replace(/\n/g, "<br>");
}

// enter key
document.getElementById("user-input")
.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

</script>

</body>
</html>
